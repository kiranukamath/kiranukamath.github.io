<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% if page.title and page.title != "Home" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | Lead Software Engineer{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%234f46e5%22/><text x=%2250%22 y=%2266%22 font-size=%2252%22 font-family=%22Arial,sans-serif%22 font-weight=%22800%22 fill=%22white%22 text-anchor=%22middle%22>K</text></svg>"/>
<script>
(function(){
  try{
    var saved=localStorage.getItem('theme');
    if(saved){document.documentElement.setAttribute('data-theme',saved);}
  }catch(e){}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"/>
{% seo %}
{% feed_meta %}
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="logo"><span class="logo-mark">KU</span><span>Kiran U Kamath</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="{{ '/' | relative_url }}#about">About</a></li>
    <li><a href="{{ '/' | relative_url }}#experience">Experience</a></li>
    <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
    <li><a href="{{ '/' | relative_url }}#skills">Skills</a></li>
    <li><a href="{{ '/' | relative_url }}#education">Education</a></li>
    <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
    <li><a href="{{ '/' | relative_url }}#contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" type="button">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
    <button class="nav-burger" id="navBurger" aria-label="Toggle menu" aria-expanded="false" type="button"><span></span></button>
  </div>
</nav>

{{ content }}

<footer>
  <p>© 2026 Kiran U Kamath · Built with care, deployed on GitHub Pages</p>
</footer>

<script>
(function(){
  // Theme toggle
  var btn=document.getElementById('themeToggle');
  if(btn){
    btn.addEventListener('click',function(){
      var root=document.documentElement;
      var current=root.getAttribute('data-theme');
      var isDark = current ? current==='dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      var next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme',next);
      try{localStorage.setItem('theme',next);}catch(e){}
    });
  }

  // Mobile nav toggle
  var burger=document.getElementById('navBurger');
  var links=document.getElementById('navLinks');
  if(burger && links){
    burger.addEventListener('click',function(){
      var open=links.classList.toggle('open');
      burger.classList.toggle('open',open);
      burger.setAttribute('aria-expanded',open?'true':'false');
    });
    links.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click',function(){
        links.classList.remove('open');
        burger.classList.remove('open');
        burger.setAttribute('aria-expanded','false');
      });
    });
  }

  // Scroll-spy active nav link (home page only)
  var sections=document.querySelectorAll('section[id]');
  var navAnchors=document.querySelectorAll('.nav-links a[href*="#"]');
  if(sections.length && navAnchors.length){
    var spy=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          navAnchors.forEach(function(a){
            var isMatch=a.getAttribute('href').indexOf('#'+entry.target.id)>-1;
            a.classList.toggle('active',isMatch);
          });
        }
      });
    },{rootMargin:'-45% 0px -45% 0px'});
    sections.forEach(function(s){spy.observe(s);});
  }

  // Reveal on scroll
  var revealEls=document.querySelectorAll('.reveal');
  if(revealEls.length){
    var ro=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('in-view');
          ro.unobserve(entry.target);
        }
      });
    },{threshold:.12});
    revealEls.forEach(function(el){ro.observe(el);});
  }
})();
</script>

</body>
</html>
