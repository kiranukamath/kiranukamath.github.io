<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% if page.title and page.title != "Home" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | Lead Software Engineer{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"/>
{% seo %}
{% feed_meta %}
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="logo"><span>Kiran U Kamath</span></a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}#about">About</a></li>
    <li><a href="{{ '/' | relative_url }}#experience">Experience</a></li>
    <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
    <li><a href="{{ '/' | relative_url }}#skills">Skills</a></li>
    <li><a href="{{ '/' | relative_url }}#education">Education</a></li>
    <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
    <li><a href="{{ '/' | relative_url }}#contact">Contact</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>© 2026 Kiran U Kamath · Built with care, deployed on GitHub Pages</p>
</footer>

</body>
</html>
